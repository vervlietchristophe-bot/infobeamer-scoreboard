<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scoreboard Controller</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600&display=swap');

:root {
  --bg:      #0b0d14;
  --surface: #12151f;
  --card:    #191c29;
  --border:  #262a3c;
  --home:    #0d1f55;
  --away:    #551010;
  --gold:    #f5c518;
  --green:   #22c55e;
  --red:     #ef4444;
  --muted:   #5a6278;
  --text:    #e8eaf2;
  --sub:     #8892a8;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'Barlow', sans-serif;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center;
  padding-bottom: 40px;
}

/* ── Header ── */
header {
  width: 100%; background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
header h1 { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:20px; letter-spacing:1px; text-transform:uppercase; }
.status-pill { display:flex; align-items:center; gap:7px; background:var(--card); border:1px solid var(--border); border-radius:99px; padding:5px 12px; font-size:12px; color:var(--sub); }
.dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; }
.dot.ok  { background:var(--green); box-shadow:0 0 5px var(--green); }
.dot.err { background:var(--red); }

/* ── Main ── */
.main { width:100%; max-width:820px; padding:20px 16px; display:flex; flex-direction:column; gap:18px; }

/* ── Section header ── */
.section-hdr { font-size:11px; text-transform:uppercase; letter-spacing:.6px; color:var(--muted); margin-bottom:-6px; padding-left:2px; }

/* ── Connection card ── */
.conn-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:14px 18px; display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.conn-card label { font-size:12px; color:var(--sub); white-space:nowrap; }
.field { background:var(--bg); border:1px solid var(--border); border-radius:7px; color:var(--text); font-family:'Barlow',monospace; font-size:14px; padding:7px 11px; outline:none; transition:border-color .2s; }
.field:focus { border-color:var(--gold); }

/* ── Match setup card ── */
.setup-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; }
.setup-inner { padding:16px 18px; display:flex; flex-wrap:wrap; gap:16px; align-items:flex-start; }
.setup-group { display:flex; flex-direction:column; gap:8px; }
.setup-group label { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--sub); }
.pill-group { display:flex; gap:6px; flex-wrap:wrap; }
.pill {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:14px; padding:6px 14px; cursor:pointer;
  transition:background .15s, border-color .15s, color .15s;
  letter-spacing:.3px; white-space:nowrap;
}
.pill:hover  { background:var(--border); }
.pill.active { background:var(--gold); color:#000; border-color:var(--gold); }
.pill.danger-active { background:var(--red); color:#fff; border-color:var(--red); }

.setup-footer { background:var(--card); border-top:1px solid var(--border); padding:10px 18px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
.format-summary { font-size:13px; color:var(--sub); flex:1; }
.format-summary strong { color:var(--gold); font-weight:600; }

/* ── Preview ── */
.preview-wrap { display:flex; flex-direction:column; align-items:center; gap:8px; }
.preview-label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; }
.preview {
  width:512px; height:128px; background:#000;
  border:1px solid var(--border); border-radius:4px;
  display:grid;
  grid-template-columns: 206px 100px 206px;
  grid-template-rows: 111px 17px;
  overflow:hidden;
  font-family:'Barlow Condensed',sans-serif;
}
@media (max-width:560px) { .preview { transform:scale(.68); transform-origin:top center; margin-bottom:-42px; } }

.pv-home, .pv-away, .pv-centre { grid-row:1; }
.pv-home   { background:#0d1f55; display:flex; flex-direction:column; justify-content:center; align-items:flex-end; padding:0 8px; }
.pv-centre { background:#111318; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; }
.pv-away   { background:#551010; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; padding:0 8px; }
.pv-bar    { grid-column:1/4; background:#0a0b10; display:flex; align-items:center; justify-content:space-between; padding:0 8px; }
.pv-team-name { font-size:11px; color:#4a5270; font-weight:600; text-transform:uppercase; letter-spacing:.5px; margin-bottom:2px; }
.pv-score     { font-size:64px; line-height:1; color:#fff; font-weight:900; }
.pv-plabel    { font-size:12px; font-weight:700; color:#f5c518; }
.pv-live      { font-size:9px; font-weight:600; color:#22c55e; }
.pv-paused    { font-size:9px; font-weight:600; color:#4a5270; }
.pv-clock     { font-size:15px; font-weight:700; color:#fff; letter-spacing:1px; }
.pv-remain    { font-size:8px; color:#4a5270; }
.pv-dots      { display:flex; gap:5px; align-items:center; }
.pv-dot       { width:7px; height:7px; border-radius:1px; background:#25272f; }
.pv-dot.on    { background:#f5c518; }
.pv-pname     { font-size:10px; color:#4a5270; }

/* ── Scoreboard controls ── */
.scoreboard { background:var(--card); border:1px solid var(--border); border-radius:12px; overflow:hidden; }
.score-row  { display:grid; grid-template-columns:1fr auto 1fr; }
.team-block { padding:20px 16px; display:flex; flex-direction:column; align-items:center; gap:10px; }
.team-block.home { background:linear-gradient(160deg,#0f2870 0%,#08164a 100%); }
.team-block.away { background:linear-gradient(160deg,#7a1010 0%,#4a0808 100%); }
.team-name-input {
  background:rgba(255,255,255,.08); border:1px solid rgba(255,255,255,.14);
  border-radius:7px; color:#fff; font-family:'Barlow Condensed',sans-serif;
  font-weight:700; font-size:18px; text-align:center; text-transform:uppercase;
  letter-spacing:1px; width:100%; padding:6px 8px; outline:none; transition:border-color .2s;
}
.team-name-input:focus { border-color:rgba(255,255,255,.4); }
.score-controls { display:flex; align-items:center; gap:10px; margin-top:2px; }
.score-btn {
  width:44px; height:44px; border-radius:50%;
  border:2px solid rgba(255,255,255,.2); background:rgba(255,255,255,.08);
  color:#fff; font-size:24px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:background .15s, transform .1s; user-select:none; line-height:1;
}
.score-btn:hover  { background:rgba(255,255,255,.18); }
.score-btn:active { transform:scale(.88); }
.score-digit {
  font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:72px;
  line-height:1; color:#fff; min-width:80px; text-align:center;
  text-shadow:0 2px 12px rgba(0,0,0,.5); transition:transform .12s;
}
.score-digit.bump { transform:scale(1.15); }
.centre-block {
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:16px 14px; gap:5px; background:var(--surface);
  border-left:1px solid var(--border); border-right:1px solid var(--border); min-width:110px;
}
.p-label-big  { font-family:'Barlow Condensed',sans-serif; font-weight:900; font-size:28px; color:var(--gold); line-height:1; }
.clock-big    { font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:26px; color:#fff; letter-spacing:2px; line-height:1; }
.remain-big   { font-size:12px; color:var(--sub); }

/* ── Period/clock row ── */
.ctrl-row {
  background:var(--surface); border-top:1px solid var(--border);
  padding:12px 16px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; justify-content:center;
}
.ctrl-btn {
  background:var(--card); border:1px solid var(--border); border-radius:7px;
  color:var(--text); font-family:'Barlow Condensed',sans-serif; font-weight:700;
  font-size:15px; padding:7px 14px; cursor:pointer;
  transition:background .15s, border-color .15s, color .15s;
  letter-spacing:.3px; white-space:nowrap;
}
.ctrl-btn:hover   { background:var(--border); }
.ctrl-btn.active  { background:var(--gold); color:#000; border-color:var(--gold); }
.ctrl-btn.go      { background:var(--green); color:#000; border-color:var(--green); font-size:14px; font-family:'Barlow',sans-serif; font-weight:600; }
.ctrl-btn.danger  { border-color:var(--red); color:var(--red); font-family:'Barlow',sans-serif; font-weight:600; font-size:13px; }
.ctrl-btn.danger:hover { background:rgba(239,68,68,.1); }
.vdiv { width:1px; height:22px; background:var(--border); margin:0 2px; }
.time-input { display:flex; align-items:center; gap:4px; background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:4px 8px; }
.time-input input[type=number] {
  background:none; border:none; color:var(--text);
  font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:18px;
  width:36px; text-align:center; outline:none; -moz-appearance:textfield;
}
.time-input input::-webkit-outer-spin-button,
.time-input input::-webkit-inner-spin-button { -webkit-appearance:none; }
.time-sep { color:var(--sub); font-weight:700; font-size:16px; }

/* ── Log ── */
.log-card { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:12px 16px; }
.log-card h3 { font-size:11px; text-transform:uppercase; letter-spacing:.5px; color:var(--sub); margin-bottom:8px; }
.log-entries { display:flex; flex-direction:column; gap:3px; max-height:110px; overflow-y:auto; }
.log-entry   { font-size:12px; color:var(--muted); border-bottom:1px solid var(--border); padding:3px 0; font-family:'Barlow',monospace; }
.log-entry.ok  { color:var(--green); }
.log-entry.err { color:var(--red); }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <h1>⚽ Scoreboard</h1>
    <span id="format-badge" style="font-size:11px;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:3px 10px;color:var(--sub)">2 × 20 min</span>
  </div>
  <div class="status-pill">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Not connected</span>
  </div>
</header>

<div class="main">

  <!-- Connection -->
  <div>
    <div class="section-hdr">Connection</div>
    <div class="conn-card" style="margin-top:8px">
      <label>Pi IP</label>
      <input type="text" class="field" id="pi-ip" placeholder="192.168.1.xx" style="min-width:140px">
      <label>Node ID</label>
      <input type="text" class="field" id="node-id" placeholder="12345" style="max-width:90px">
      <button class="ctrl-btn" onclick="testConn()" style="font-family:'Barlow',sans-serif;font-size:13px;font-weight:600">Test</button>
    </div>
  </div>

  <!-- Match format setup -->
  <div>
    <div class="section-hdr">Match format</div>
    <div class="setup-card" style="margin-top:8px">
      <div class="setup-inner">
        <div class="setup-group">
          <label>Periods</label>
          <div class="pill-group" id="pg-periods">
            <button class="pill" onclick="setPeriods(2)">2 halves</button>
            <button class="pill" onclick="setPeriods(4)">4 quarters</button>
          </div>
        </div>
        <div class="setup-group">
          <label>Duration per period</label>
          <div class="pill-group" id="pg-duration">
            <button class="pill" onclick="setDuration(10)">10 min</button>
            <button class="pill" onclick="setDuration(15)">15 min</button>
            <button class="pill" onclick="setDuration(20)">20 min</button>
            <button class="pill" onclick="setDuration(25)">25 min</button>
            <button class="pill" onclick="setDuration(30)">30 min</button>
            <button class="pill" onclick="setDuration(45)">45 min</button>
          </div>
        </div>
      </div>
      <div class="setup-footer">
        <span class="format-summary" id="format-summary">Pick a format above</span>
        <button class="ctrl-btn danger" onclick="resetAll()" style="font-size:13px">Reset match</button>
      </div>
    </div>
  </div>

  <!-- 512×128 preview -->
  <div class="preview-wrap">
    <div class="preview-label">Display preview — 512 × 128 px</div>
    <div class="preview">
      <div class="pv-home">
        <div class="pv-team-name" id="pv-home-name">HOME</div>
        <div class="pv-score"     id="pv-home-score">0</div>
      </div>
      <div class="pv-centre">
        <div class="pv-plabel"  id="pv-plabel">H1</div>
        <div class="pv-live"    id="pv-live" style="display:none">LIVE</div>
        <div class="pv-paused"  id="pv-paused">PAUSED</div>
        <div class="pv-clock"   id="pv-clock">00:00</div>
        <div class="pv-remain"  id="pv-remain">— left</div>
      </div>
      <div class="pv-away">
        <div class="pv-team-name" id="pv-away-name">AWAY</div>
        <div class="pv-score"     id="pv-away-score">0</div>
      </div>
      <div class="pv-bar">
        <div class="pv-dots" id="pv-dots"></div>
        <div class="pv-pname" id="pv-pname">—</div>
      </div>
    </div>
  </div>

  <!-- Scoreboard -->
  <div class="scoreboard">
    <div class="score-row">
      <div class="team-block home">
        <input class="team-name-input" id="home-name" value="Home" maxlength="14" oninput="sync();push();">
        <div class="score-controls">
          <button class="score-btn" onclick="adj('home',-1)">−</button>
          <div class="score-digit" id="home-score">0</div>
          <button class="score-btn" onclick="adj('home',+1)">+</button>
        </div>
      </div>
      <div class="centre-block">
        <div class="p-label-big" id="p-label-big">H1</div>
        <div class="clock-big"   id="clock-big">00:00</div>
        <div class="remain-big"  id="remain-big">— left</div>
      </div>
      <div class="team-block away">
        <input class="team-name-input" id="away-name" value="Away" maxlength="14" oninput="sync();push();">
        <div class="score-controls">
          <button class="score-btn" onclick="adj('away',-1)">−</button>
          <div class="score-digit" id="away-score">0</div>
          <button class="score-btn" onclick="adj('away',+1)">+</button>
        </div>
      </div>
    </div>

    <!-- Period buttons (generated dynamically) -->
    <div class="ctrl-row" id="period-row">
      <span style="font-size:12px;color:var(--muted)">Set match format first ↑</span>
    </div>

    <!-- Clock controls -->
    <div class="ctrl-row">
      <button class="ctrl-btn go" id="btn-start" onclick="toggleClock()">▶ Start</button>
      <button class="ctrl-btn" onclick="resetClock()" style="font-family:'Barlow',sans-serif;font-size:13px;font-weight:600">↺ Reset clock</button>
      <div class="vdiv"></div>
      <span style="font-size:12px;color:var(--sub)">Set time</span>
      <div class="time-input">
        <input type="number" id="mm-in" value="0" min="0" max="99" oninput="manualTime()">
        <span class="time-sep">:</span>
        <input type="number" id="ss-in" value="0" min="0" max="59" oninput="manualTime()">
      </div>
    </div>
  </div>

  <!-- Log -->
  <div class="log-card">
    <h3>Push log</h3>
    <div class="log-entries" id="log"></div>
  </div>

</div>

<script>
// ── Match config ──────────────────────────────────────────────────────────────
const CFG = { periods: 0, duration: 0 };   // 0 = not yet set

// ── Live state pushed to Pi ───────────────────────────────────────────────────
const S = {
  home_name:'Home', away_name:'Away',
  home_score:0, away_score:0,
  period:1,      // current period number (1-based)
  total_periods:2,
  duration_min:20,
  minute:0, second:0,
  match_live:false,
};

let clockTimer = null;
let pushTimer  = null;

// ── Persist settings ──────────────────────────────────────────────────────────
(function init() {
  const c = JSON.parse(localStorage.getItem('sb_cfg2') || '{}');
  if (c.ip)       document.getElementById('pi-ip').value   = c.ip;
  if (c.nodeId)   document.getElementById('node-id').value = c.nodeId;
  if (c.periods)  setPeriods(c.periods, true);
  if (c.duration) setDuration(c.duration, true);
  sync();
})();

function saveCfg() {
  localStorage.setItem('sb_cfg2', JSON.stringify({
    ip:       document.getElementById('pi-ip').value.trim(),
    nodeId:   document.getElementById('node-id').value.trim(),
    periods:  CFG.periods,
    duration: CFG.duration,
  }));
}

// ── Format setup ──────────────────────────────────────────────────────────────
function setPeriods(n, silent) {
  CFG.periods = n;
  S.total_periods = n;
  document.querySelectorAll('#pg-periods .pill').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === n || b.textContent.startsWith(n+''));
  });
  // match by first char of pill text
  document.querySelectorAll('#pg-periods .pill').forEach(b => {
    const num = b.textContent.startsWith('2') ? 2 : 4;
    b.classList.toggle('active', num === n);
  });
  buildPeriodButtons();
  updateFormatSummary();
  sync();
  if (!silent) { saveCfg(); schedulePush(); }
}

function setDuration(m, silent) {
  CFG.duration = m;
  S.duration_min = m;
  document.querySelectorAll('#pg-duration .pill').forEach(b => {
    b.classList.toggle('active', parseInt(b.textContent) === m);
  });
  updateFormatSummary();
  sync();
  if (!silent) { saveCfg(); schedulePush(); }
}

function updateFormatSummary() {
  const p = CFG.periods, d = CFG.duration;
  const el = document.getElementById('format-summary');
  const badge = document.getElementById('format-badge');
  if (!p && !d) { el.innerHTML = 'Pick a format above'; return; }
  const pname = p === 2 ? 'halves' : p === 4 ? 'quarters' : `periods`;
  const total = (p && d) ? ` — <strong>${p * d} min</strong> total` : '';
  el.innerHTML = p && d
    ? `<strong>${p}</strong> ${pname} × <strong>${d} min</strong>${total}`
    : p ? `<strong>${p}</strong> ${pname} — pick duration`
        : `<strong>${d} min</strong> per period — pick number of periods`;
  badge.textContent = p && d ? `${p} × ${d} min` : '—';
}

function buildPeriodButtons() {
  const row = document.getElementById('period-row');
  const n = CFG.periods;
  if (!n) return;

  // Labels: 2 periods → H1 H2 | 4 periods → Q1 Q2 Q3 Q4
  const labels = n === 2
    ? ['H1','H2']
    : ['Q1','Q2','Q3','Q4'];

  row.innerHTML = '<span style="font-size:12px;color:var(--sub)">Period</span>';
  labels.forEach((lbl, i) => {
    const btn = document.createElement('button');
    btn.className = 'ctrl-btn' + (S.period === i+1 ? ' active' : '');
    btn.textContent = lbl;
    btn.onclick = () => setPeriodActive(i+1);
    row.appendChild(btn);
  });
}

function setPeriodActive(p) {
  S.period = p;
  buildPeriodButtons();
  sync();
  schedulePush();
}

// ── Score ─────────────────────────────────────────────────────────────────────
function adj(team, delta) {
  const key = team+'_score';
  S[key] = Math.max(0, S[key]+delta);
  const el = document.getElementById(team+'-score');
  el.textContent = S[key];
  el.classList.add('bump');
  setTimeout(()=>el.classList.remove('bump'),140);
  sync(); schedulePush();
}

// ── Clock ─────────────────────────────────────────────────────────────────────
function toggleClock() {
  if (!CFG.periods || !CFG.duration) { alert('Set the match format first.'); return; }
  S.match_live = !S.match_live;
  const btn = document.getElementById('btn-start');
  if (S.match_live) {
    btn.textContent = '⏸ Pause'; btn.classList.add('active');
    clockTimer = setInterval(() => {
      S.second++;
      if (S.second >= 60) { S.second=0; S.minute++; }
      if (S.minute >= CFG.duration) {
        S.minute=CFG.duration; S.second=0;
        S.match_live=false; clearInterval(clockTimer);
        btn.textContent='▶ Start'; btn.classList.remove('active');
      }
      sync(); doPush();
    }, 1000);
  } else {
    btn.textContent='▶ Start'; btn.classList.remove('active');
    clearInterval(clockTimer);
  }
  sync(); schedulePush();
}

function resetClock() {
  clearInterval(clockTimer);
  S.match_live=false; S.minute=0; S.second=0;
  document.getElementById('btn-start').textContent='▶ Start';
  document.getElementById('btn-start').classList.remove('active');
  document.getElementById('mm-in').value=0;
  document.getElementById('ss-in').value=0;
  sync(); schedulePush();
}

function manualTime() {
  S.minute = Math.min(CFG.duration||99, parseInt(document.getElementById('mm-in').value)||0);
  S.second = Math.min(59, parseInt(document.getElementById('ss-in').value)||0);
  sync(); schedulePush();
}

// ── Reset all ─────────────────────────────────────────────────────────────────
function resetAll() {
  if (!confirm('Reset match to 0–0, period 1, 00:00?')) return;
  clearInterval(clockTimer);
  Object.assign(S,{home_score:0,away_score:0,period:1,minute:0,second:0,match_live:false});
  document.getElementById('home-score').textContent='0';
  document.getElementById('away-score').textContent='0';
  document.getElementById('btn-start').textContent='▶ Start';
  document.getElementById('btn-start').classList.remove('active');
  document.getElementById('mm-in').value=0;
  document.getElementById('ss-in').value=0;
  buildPeriodButtons();
  sync(); schedulePush();
}

// ── Sync UI + preview ─────────────────────────────────────────────────────────
function periodLabel(p) {
  if (CFG.periods === 2) return p===1?'H1':'H2';
  if (CFG.periods === 4) return 'Q'+p;
  return 'P'+p;
}

function periodFullName(p) {
  if (CFG.periods === 2) return p===1?'1st Half':'2nd Half';
  if (CFG.periods === 4) return 'Quarter '+p;
  return 'Period '+p;
}

function pad(n) { return String(n).padStart(2,'0'); }

function sync() {
  S.home_name = document.getElementById('home-name').value || 'Home';
  S.away_name = document.getElementById('away-name').value || 'Away';

  const dur   = CFG.duration || 20;
  const plbl  = CFG.periods  ? periodLabel(S.period) : '—';
  const pfull = CFG.periods  ? periodFullName(S.period) : '—';
  const clock = pad(S.minute)+':'+pad(S.second);
  const remSec = Math.max(0, dur*60 - (S.minute*60+S.second));
  const rm = Math.floor(remSec/60), rs = remSec%60;
  const remTxt = remSec===0 ? 'Full time!' : rm>0 ? rm+'m left' : rs+'s left';

  // Big controller display
  document.getElementById('p-label-big').textContent = plbl;
  document.getElementById('clock-big').textContent   = clock;
  document.getElementById('remain-big').textContent  = remTxt;

  // Preview
  document.getElementById('pv-home-name').textContent  = S.home_name.toUpperCase().slice(0,12);
  document.getElementById('pv-away-name').textContent  = S.away_name.toUpperCase().slice(0,12);
  document.getElementById('pv-home-score').textContent = S.home_score;
  document.getElementById('pv-away-score').textContent = S.away_score;
  document.getElementById('pv-plabel').textContent     = plbl;
  document.getElementById('pv-clock').textContent      = clock;
  document.getElementById('pv-remain').textContent     = remTxt;
  document.getElementById('pv-live').style.display     = S.match_live ? '' : 'none';
  document.getElementById('pv-paused').style.display   = S.match_live ? 'none' : '';
  document.getElementById('pv-pname').textContent      = pfull;

  // Dots
  const n = CFG.periods || 2;
  const dots = document.getElementById('pv-dots');
  dots.innerHTML = '';
  for (let i=1;i<=n;i++) {
    const d = document.createElement('div');
    d.className='pv-dot'+(i<=S.period?' on':'');
    dots.appendChild(d);
  }
}

// ── Push ──────────────────────────────────────────────────────────────────────
function schedulePush() { clearTimeout(pushTimer); pushTimer=setTimeout(doPush,300); }

async function doPush() {
  const ip     = document.getElementById('pi-ip').value.trim();
  const nodeId = document.getElementById('node-id').value.trim();
  saveCfg();
  if (!ip||!nodeId) return;
  const url = `http://${ip}:4444/api/1/data/${nodeId}`;
  try {
    const r = await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(S),signal:AbortSignal.timeout(3000)});
    if (r.ok) {
      setConn(true);
      addLog(`✓  ${S.home_name} ${S.home_score}–${S.away_score} ${S.away_name}  ${periodLabel(S.period)} ${pad(S.minute)}:${pad(S.second)}`,'ok');
    } else { setConn(false); addLog(`✗  HTTP ${r.status}`,'err'); }
  } catch(e) { setConn(false); addLog(`✗  ${e.message}`,'err'); }
}

function testConn() { addLog('Testing…',''); doPush(); }
function setConn(ok) {
  document.getElementById('conn-dot').className='dot '+(ok?'ok':'err');
  document.getElementById('conn-label').textContent=ok?'Connected':'No response';
}
function addLog(msg,cls) {
  const c=document.getElementById('log');
  const e=document.createElement('div');
  e.className='log-entry '+(cls||'');
  e.textContent=new Date().toLocaleTimeString()+'  '+msg;
  c.prepend(e);
  while(c.children.length>40) c.removeChild(c.lastChild);
}
</script>
