<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background:#000;
  width:100vw; height:100vh;
  overflow:hidden;
  font-family:'Barlow Condensed', sans-serif;
}

/* Board fills the page by default; JS may override to fixed pixels for LED. */
/* container-type: size  →  inside, *cqmin/cqi/cqb units scale to the board, */
/* not the viewport, so layout works at both fluid and fixed sizes.          */
#board {
  width:100vw; height:100vh;
  position:absolute;
  top:0; left:0;
  display:grid;
  grid-template-columns: 41fr 18fr 41fr;
  grid-template-rows: 87fr 13fr;
  container-type: size;
}

/* ── Panels ── */
.pv-home   { background:rgb(10,20,71);  display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 1.5cqmin; overflow:hidden; }
.pv-centre { background:rgb(18,18,23);  display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:1.5cqmin 0 0; gap:.4cqmin; overflow:hidden; }
.pv-away   { background:rgb(66,10,10);  display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 1.5cqmin; overflow:hidden; }
.pv-bar    { grid-column:1/4; background:rgb(10,10,15); display:flex; align-items:center; justify-content:space-between; padding:0 1.8cqmin; }

/* ── Team names ── */
.team-name {
  font-size:6cqmin; font-weight:600; color:#666677;
  text-transform:uppercase; letter-spacing:.2cqmin;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:95%;
  line-height:1; margin-bottom:.6cqmin;
}

/* ── Scores ── */
.score {
  font-size:48cqmin; font-weight:900; color:#fff; line-height:1;
}

/* ── Centre info ── */
.p-label  { font-size:7cqmin; font-weight:700; color:#f5c518; line-height:1.1; }
.status   { font-size:5cqmin; font-weight:600; line-height:1.2; }
.status.live   { color:#26e159; }
.status.paused { color:#666677; }
.clock    { font-size:10cqmin; font-weight:700; color:#fff; letter-spacing:.3cqmin; line-height:1.2; }
.remain   { font-size:4cqmin; color:#666677; line-height:1.2; }

/* ── Status bar ── */
.dots { display:flex; gap:.8cqmin; align-items:center; }
.dot  { width:1.6cqmin; height:1.6cqmin; border-radius:.25cqmin; }
.dot.on  { background:#f5c518; }
.dot.off { background:#383840; }
.period-long { font-size:5cqmin; color:#666677; }

/* ── Event notification ── */
#notif {
  position:absolute; left:0; right:0;
  bottom:13%; height:6cqmin;
  display:flex; align-items:center; justify-content:center; gap:1.5cqmin;
  background:rgba(0,0,0,.82);
  font-size:5cqmin; font-weight:700; letter-spacing:.1cqmin;
  opacity:0; transition:opacity .4s;
  pointer-events:none;
}
#notif .n-badge { width:2.8cqmin; height:2.8cqmin; border-radius:.4cqmin; flex-shrink:0; }
#notif .n-player { color:#fff; }
#notif .n-min { color:#888; font-weight:400; }

/* ── No-signal overlay (page-level, in case board is small) ── */
#no-signal {
  position:fixed; bottom:1vmin; left:50%; transform:translateX(-50%);
  background:rgba(200,40,40,.85); color:#fff;
  padding:.5vmin 2vmin; border-radius:.5vmin;
  font-family:sans-serif; font-size:2vmin; letter-spacing:.1vmin;
  display:none;
}
</style>
</head>
<body>

<div id="board">
  <div class="pv-home">
    <div class="team-name" id="home-name">HOME</div>
    <div class="score"     id="home-score">0</div>
  </div>
  <div class="pv-centre">
    <div class="p-label" id="p-label">H1</div>
    <div class="status paused" id="status">PAUSED</div>
    <div class="clock"   id="clock">00:00</div>
    <div class="remain"  id="remain">20m left</div>
  </div>
  <div class="pv-away">
    <div class="team-name" id="away-name">AWAY</div>
    <div class="score"     id="away-score">0</div>
  </div>
  <div class="pv-bar">
    <div class="dots" id="dots"></div>
    <div class="period-long" id="period-long">1st Half</div>
  </div>

  <div id="notif">
    <div class="n-badge" id="n-badge"></div>
    <span class="n-player" id="n-player"></span>
    <span class="n-min"    id="n-min"></span>
  </div>
</div>

<div id="no-signal">NO SIGNAL</div>

<script>
// ── LED-mode positioning ─────────────────────────────────────────────────────
// Default: board fills the whole page (fluid).
// LED mode: pass ?w=350&h=75&pos=tr to render at exact pixels in a corner.
//   pos values: tl (top-left, default), tr (top-right), bl, br, c (center)
// This is for LED walls whose controller reads a fixed-size pixel window
// from the HDMI signal at a specific corner — we render the board exactly
// inside that window so it shows up undistorted on the LED.
(function applyLedMode() {
  const p = new URLSearchParams(location.search);
  const w = parseInt(p.get('w'));
  const h = parseInt(p.get('h'));
  const pos = (p.get('pos') || 'tl').toLowerCase();
  if (!w || !h) return; // fluid default

  const b = document.getElementById('board');
  b.style.width  = w + 'px';
  b.style.height = h + 'px';
  // Clear any default placement first
  b.style.top = b.style.right = b.style.bottom = b.style.left = 'auto';
  b.style.transform = '';
  switch (pos) {
    case 'tr': b.style.top    = '0';   b.style.right  = '0';   break;
    case 'bl': b.style.bottom = '0';   b.style.left   = '0';   break;
    case 'br': b.style.bottom = '0';   b.style.right  = '0';   break;
    case 'c':
      b.style.top = '50%'; b.style.left = '50%';
      b.style.transform = 'translate(-50%, -50%)';
      break;
    default: // tl
      b.style.top = '0'; b.style.left = '0';
  }
})();

// ── WebSocket ─────────────────────────────────────────────────────────────────
const wsProto  = location.protocol === 'https:' ? 'wss' : 'ws';
const wsUrl    = `${wsProto}://${location.host}`;
let   ws, reconnectTimer;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen    = () => clearTimeout(reconnectTimer);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'state') render(msg.data);
    } catch {}
  };
  ws.onclose = () => { reconnectTimer = setTimeout(connect, 2000); };
  ws.onerror  = () => ws.close();
}
connect();

setInterval(() => {
  const ok = ws && ws.readyState === 1;
  document.getElementById('no-signal').style.display = ok ? 'none' : 'block';
}, 1000);

// ── Event notification ────────────────────────────────────────────────────────
let lastEventSeq = 0;
let notifTimer   = null;

function showNotif(evt) {
  const badgeColor = evt.type === 'goal' ? '#22c55e' : evt.type === 'yellow' ? '#FFD700' : '#ef4444';
  document.getElementById('n-badge').style.background  = badgeColor;
  document.getElementById('n-player').textContent = evt.player ? evt.player.toUpperCase() : (evt.type === 'goal' ? 'GOAL' : evt.type === 'yellow' ? 'YELLOW CARD' : 'RED CARD');
  document.getElementById('n-min').textContent    = evt.minute + "'";
  const el = document.getElementById('notif');
  el.style.opacity = '1';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.opacity = '0'; }, 30000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');

const T = {
  en: {
    paused:    'PAUSED',
    time:      'Time!',
    minLeft:   m => m + ' min left',
    secLeft:   s => s + 's left',
    half1:     '1st Half', half2: '2nd Half',
    quarter:   q => 'Quarter ' + q,
    period:    p => 'Period ' + p,
    brk:       'Break',
    noSignal:  'NO SIGNAL',
  },
  nl: {
    paused:    'PAUZE',
    time:      'Tijd!',
    minLeft:   m => m + ' min over',
    secLeft:   s => s + 's over',
    half1:     '1e Helft', half2: '2e Helft',
    quarter:   q => 'Kwart ' + q,
    period:    p => 'Periode ' + p,
    brk:       'Pauze',
    noSignal:  'GEEN SIGNAAL',
  },
};
let lang = T.nl;

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.45;
}

function periodShort(p, t) {
  if (t === 2) return p === 1 ? 'H1' : 'H2';
  if (t === 4) return 'Q' + p;
  return 'P' + p;
}
function periodLong(p, t) {
  if (t === 2) return p === 1 ? lang.half1 : lang.half2;
  if (t === 4) return lang.quarter(p);
  return lang.period(p);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(s) {
  document.getElementById('home-name').textContent  = s.home_name.toUpperCase().slice(0, 14);
  document.getElementById('away-name').textContent  = s.away_name.toUpperCase().slice(0, 14);
  lang = T[s.lang] || T.nl;
  document.getElementById('no-signal').textContent = lang.noSignal;

  if (s.event_seq && s.event_seq > lastEventSeq && s.last_event) {
    lastEventSeq = s.event_seq;
    showNotif(s.last_event);
  }

  if (s.home_color) {
    document.querySelector('.pv-home').style.background = s.home_color;
    const htc = isLight(s.home_color);
    document.getElementById('home-name').style.color  = htc ? 'rgba(0,0,0,.5)'   : 'rgba(255,255,255,.45)';
    document.getElementById('home-score').style.color = htc ? '#111' : '#fff';
  }
  if (s.away_color) {
    document.querySelector('.pv-away').style.background = s.away_color;
    const atc = isLight(s.away_color);
    document.getElementById('away-name').style.color  = atc ? 'rgba(0,0,0,.5)'   : 'rgba(255,255,255,.45)';
    document.getElementById('away-score').style.color = atc ? '#111' : '#fff';
  }
  document.getElementById('home-score').textContent = s.home_score;
  document.getElementById('away-score').textContent = s.away_score;

  document.getElementById('p-label').textContent = periodShort(s.period, s.total_periods);

  const statusEl = document.getElementById('status');
  statusEl.textContent = s.match_live ? 'LIVE' : lang.paused;
  statusEl.className   = 'status ' + (s.match_live ? 'live' : 'paused');

  document.getElementById('clock').textContent = pad(s.minute) + ':' + pad(s.second);

  const rem = Math.max(0, s.duration_min * 60 - (s.minute * 60 + s.second));
  const rm  = Math.floor(rem / 60), rs = rem % 60;
  document.getElementById('remain').textContent =
    rem === 0 ? lang.time : rm > 0 ? lang.minLeft(rm) : lang.secLeft(rs);

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 1; i <= s.total_periods; i++) {
    const d = document.createElement('div');
    d.className = 'dot ' + (i <= s.period ? 'on' : 'off');
    dots.appendChild(d);
  }

  let plong = periodLong(s.period, s.total_periods);
  if (!s.match_live && s.minute === 0 && s.second === 0 && s.period > 1) plong = lang.brk;
  document.getElementById('period-long').textContent = plong;
}
</script>
</body>
</html>
