<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #000;
  width: 100vw; height: 100vh;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* Fixed 512×128 canvas, scaled by JS to fill screen */
#board {
  position: absolute;
  width: 512px; height: 128px;
  display: grid;
  grid-template-columns: 206px 100px 206px;
  grid-template-rows: 111px 17px;
  transform-origin: top left;
  font-family: 'Barlow Condensed', sans-serif;
}

/* ── Panels ── */
.pv-home   { background: rgb(10,20,71);  display:flex; flex-direction:column; justify-content:center; align-items:flex-end;   padding:0 6px; }
.pv-centre { background: rgb(18,18,23);  display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:3px 0 0; gap:1px; }
.pv-away   { background: rgb(66,10,10);  display:flex; flex-direction:column; justify-content:center; align-items:flex-start;  padding:0 6px; }
.pv-bar    { grid-column:1/4; background:rgb(10,10,15); display:flex; align-items:center; justify-content:space-between; padding:0 8px; }

/* ── Team names ── */
.team-name {
  font-size:13px; font-weight:600; color:#666677;
  text-transform:uppercase; letter-spacing:.5px;
  white-space:nowrap; overflow:hidden; max-width:198px;
  margin-bottom:1px;
}

/* ── Scores ── */
.score {
  font-size:72px; font-weight:900; color:#fff; line-height:1;
}

/* ── Centre info ── */
.p-label  { font-size:13px; font-weight:700; color:#f5c518; line-height:1.1; }
.status   { font-size:10px; font-weight:600; line-height:1.2; }
.status.live   { color:#26e159; }
.status.paused { color:#666677; }
.clock    { font-size:16px; font-weight:700; color:#fff; letter-spacing:1px; line-height:1.2; }
.remain   { font-size:9px; color:#666677; line-height:1.2; }

/* ── Status bar ── */
.dots { display:flex; gap:4px; align-items:center; }
.dot  { width:8px; height:8px; border-radius:1px; }
.dot.on  { background:#f5c518; }
.dot.off { background:#383840; }
.period-long { font-size:11px; color:#666677; }

/* ── Event notification ── */
#notif {
  position:absolute; left:0; right:0;
  bottom:17px; height:24px;
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:rgba(0,0,0,.82);
  font-size:12px; font-weight:700; letter-spacing:.5px;
  opacity:0; transition:opacity .4s;
  pointer-events:none;
}
#notif .n-badge { width:13px; height:13px; border-radius:2px; flex-shrink:0; }
#notif .n-player { color:#fff; }
#notif .n-min { color:#888; font-weight:400; }

/* ── No-signal overlay ── */
#no-signal {
  position:fixed; bottom:4px; left:50%; transform:translateX(-50%);
  background:rgba(200,40,40,.85); color:#fff;
  padding:2px 10px; border-radius:3px;
  font-family:sans-serif; font-size:10px; letter-spacing:.5px;
  display:none;
}
</style>
</head>
<body>

<div id="board">
  <div class="pv-home">
    <div class="team-name" id="home-name">HOME</div>
    <div class="score"     id="home-score">0</div>
  </div>
  <div class="pv-centre">
    <div class="p-label" id="p-label">H1</div>
    <div class="status paused" id="status">PAUSED</div>
    <div class="clock"   id="clock">00:00</div>
    <div class="remain"  id="remain">20m left</div>
  </div>
  <div class="pv-away">
    <div class="team-name" id="away-name">AWAY</div>
    <div class="score"     id="away-score">0</div>
  </div>
  <div class="pv-bar">
    <div class="dots" id="dots"></div>
    <div class="period-long" id="period-long">1st Half</div>
  </div>
</div>

<div id="notif">
  <div class="n-badge" id="n-badge"></div>
  <span class="n-player" id="n-player"></span>
  <span class="n-min"    id="n-min"></span>
</div>

<div id="no-signal">NO SIGNAL</div>

<script>
// ── Scale board to fill screen ────────────────────────────────────────────────
const board = document.getElementById('board');

function resize() {
  const sx = window.innerWidth  / 512;
  const sy = window.innerHeight / 128;
  board.style.transform = `scale(${sx},${sy})`;
  board.style.left = '0px';
  board.style.top  = '0px';
}
window.addEventListener('resize', resize);
resize();

// ── WebSocket ─────────────────────────────────────────────────────────────────
const wsProto  = location.protocol === 'https:' ? 'wss' : 'ws';
const wsUrl    = `${wsProto}://${location.host}`;
let   ws, lastUpdate = 0, reconnectTimer;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen    = () => clearTimeout(reconnectTimer);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'state') { lastUpdate = Date.now(); render(msg.data); }
    } catch {}
  };
  ws.onclose = () => { reconnectTimer = setTimeout(connect, 2000); };
  ws.onerror  = () => ws.close();
}
connect();

setInterval(() => {
  const stale = lastUpdate > 0 && (Date.now() - lastUpdate) > 15000;
  document.getElementById('no-signal').style.display = stale ? 'block' : 'none';
}, 1000);

// ── Event notification ────────────────────────────────────────────────────────
let lastEventSeq = 0;
let notifTimer   = null;

function showNotif(evt) {
  const badgeColor = evt.type === 'goal' ? '#22c55e' : evt.type === 'yellow' ? '#FFD700' : '#ef4444';
  document.getElementById('n-badge').style.background  = badgeColor;
  document.getElementById('n-player').textContent = evt.player ? evt.player.toUpperCase() : (evt.type === 'goal' ? 'GOAL' : evt.type === 'yellow' ? 'YELLOW CARD' : 'RED CARD');
  document.getElementById('n-min').textContent    = evt.minute + "'";
  const el = document.getElementById('notif');
  el.style.opacity = '1';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.opacity = '0'; }, 5000);
}

// ── Helpers ───────────────────────────────────────────────────────────────────
const pad = n => String(n).padStart(2, '0');
function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.45;
}

function periodShort(p, t) {
  if (t === 2) return p === 1 ? 'H1' : 'H2';
  if (t === 4) return 'Q' + p;
  return 'P' + p;
}
function periodLong(p, t) {
  if (t === 2) return p === 1 ? '1st Half' : '2nd Half';
  if (t === 4) return 'Quarter ' + p;
  return 'Period ' + p;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(s) {
  document.getElementById('home-name').textContent  = s.home_name.toUpperCase().slice(0, 14);
  document.getElementById('away-name').textContent  = s.away_name.toUpperCase().slice(0, 14);
  if (s.event_seq && s.event_seq > lastEventSeq && s.last_event) {
    lastEventSeq = s.event_seq;
    showNotif(s.last_event);
  }

  if (s.home_color) {
    document.querySelector('.pv-home').style.background = s.home_color;
    const htc = isLight(s.home_color);
    document.getElementById('home-name').style.color  = htc ? 'rgba(0,0,0,.5)'   : 'rgba(255,255,255,.45)';
    document.getElementById('home-score').style.color = htc ? '#111' : '#fff';
  }
  if (s.away_color) {
    document.querySelector('.pv-away').style.background = s.away_color;
    const atc = isLight(s.away_color);
    document.getElementById('away-name').style.color  = atc ? 'rgba(0,0,0,.5)'   : 'rgba(255,255,255,.45)';
    document.getElementById('away-score').style.color = atc ? '#111' : '#fff';
  }
  document.getElementById('home-score').textContent = s.home_score;
  document.getElementById('away-score').textContent = s.away_score;

  document.getElementById('p-label').textContent = periodShort(s.period, s.total_periods);

  const statusEl = document.getElementById('status');
  statusEl.textContent = s.match_live ? 'LIVE' : 'PAUSED';
  statusEl.className   = 'status ' + (s.match_live ? 'live' : 'paused');

  document.getElementById('clock').textContent = pad(s.minute) + ':' + pad(s.second);

  const rem = Math.max(0, s.duration_min * 60 - (s.minute * 60 + s.second));
  const rm  = Math.floor(rem / 60), rs = rem % 60;
  document.getElementById('remain').textContent =
    rem === 0 ? 'Time!' : rm > 0 ? rm + 'm left' : rs + 's left';

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 1; i <= s.total_periods; i++) {
    const d = document.createElement('div');
    d.className = 'dot ' + (i <= s.period ? 'on' : 'off');
    dots.appendChild(d);
  }

  let plong = periodLong(s.period, s.total_periods);
  if (!s.match_live && s.minute === 0 && s.second === 0 && s.period > 1) plong = 'Break';
  document.getElementById('period-long').textContent = plong;
}
</script>
</body>
</html>
