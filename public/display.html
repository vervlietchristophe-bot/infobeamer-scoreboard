<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Scoreboard Display</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  background:#000;
  width:100vw; height:100vh;
  overflow:hidden;
  font-family:'Barlow Condensed', sans-serif;
}

#board {
  width:100vw; height:100vh;
  position:absolute;
  top:0; left:0;
  display:grid;
  grid-template-columns: 41fr 18fr 41fr;
  grid-template-rows: 87fr 13fr;
  container-type: size;
}

.pv-home   { background:rgb(10,20,71);  display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 1.5cqmin; overflow:hidden; }
.pv-centre { background:rgb(18,18,23);  display:flex; flex-direction:column; align-items:center; justify-content:flex-start; padding:1.5cqmin 0 0; gap:.4cqmin; overflow:hidden; }
.pv-away   { background:rgb(66,10,10);  display:flex; flex-direction:column; justify-content:center; align-items:center; padding:0 1.5cqmin; overflow:hidden; }
.pv-bar    { grid-column:1/4; background:rgb(10,10,15); display:flex; align-items:center; justify-content:space-between; padding:0 1.8cqmin; }

.team-name {
  font-size:20cqmin; font-weight:600; color:#ffffff;
  text-transform:uppercase; letter-spacing:.2cqmin;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  max-width:95%;
  line-height:1; margin-bottom:.6cqmin;
}

.score { font-size:48cqmin; font-weight:900; color:#fff; line-height:1; }

.p-label  { font-size:14cqmin; font-weight:700; color:#ffd64a; line-height:1.1; }
.status   { font-size:10cqmin; font-weight:600; line-height:1.2; }
.status.live   { color:#5dff8b; }
.status.paused { color:#e0e0e8; }
.clock    { font-size:20cqmin; font-weight:700; color:#fff; letter-spacing:.3cqmin; line-height:1.2; }
.remain   { font-size:8cqmin; color:#d0d0d8; line-height:1.2; }

.dots { display:flex; gap:.8cqmin; align-items:center; }
.dot  { width:3cqmin; height:3cqmin; border-radius:.25cqmin; }
.dot.on  { background:#ffd64a; }
.dot.off { background:#5a5a66; }
.period-long { font-size:10cqmin; color:#e0e0e8; }

#notif {
  position:absolute; left:0; right:0;
  bottom:13%; height:12cqmin;
  display:flex; align-items:center; justify-content:center; gap:1.5cqmin;
  background:rgba(0,0,0,.82);
  font-size:10cqmin; font-weight:700; letter-spacing:.1cqmin;
  opacity:0; transition:opacity .4s;
  pointer-events:none;
}
#notif .n-badge { width:5cqmin; height:5cqmin; border-radius:.4cqmin; flex-shrink:0; }
#notif .n-player { color:#fff; }
#notif .n-min { color:#888; font-weight:400; }

#no-signal {
  position:fixed; bottom:1vmin; left:50%; transform:translateX(-50%);
  background:rgba(200,40,40,.85); color:#fff;
  padding:.5vmin 2vmin; border-radius:.5vmin;
  font-family:sans-serif; font-size:2vmin; letter-spacing:.1vmin;
  display:none;
}

#ad-overlay {
  position:absolute; inset:0;
  background:#000;
  display:none;
  align-items:center; justify-content:center;
  gap:3cqmin;
  overflow:hidden;
  z-index:50;
}
#ad-overlay.show { display:flex; }
#ad-overlay img {
  max-height:88%;
  max-width:60%;
  object-fit:contain;
  image-rendering:pixelated;
}
#ad-overlay .ad-text {
  color:#fff; font-weight:900;
  font-size:24cqmin; line-height:1.05;
  text-transform:uppercase; letter-spacing:.4cqmin;
  text-align:center;
  max-width:96%;
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
#ad-overlay.text-only .ad-text { font-size:32cqmin; }
#ad-overlay.image-only .ad-text { display:none; }

/* ── Calibration overlay (?cal=1) ── */
#cal {
  position:fixed; inset:0;
  display:none;
  grid-template-columns: repeat(8, 1fr);
  grid-template-rows: repeat(4, 1fr);
  font-family:'Barlow Condensed', sans-serif;
  font-weight:900;
  z-index:9999;
}
#cal.show { display:grid; }
#cal .c {
  display:flex; align-items:center; justify-content:center;
  color:#fff; text-shadow:0 0 4px #000, 0 0 8px #000;
  font-size:8vmin;
  border:1px solid rgba(0,0,0,.35);
}
</style>
</head>
<body>

<div id="cal"></div>

<div id="board">
  <div class="pv-home">
    <div class="team-name" id="home-name">HOME</div>
    <div class="score"     id="home-score">0</div>
  </div>
  <div class="pv-centre">
    <div class="p-label" id="p-label">H1</div>
    <div class="status paused" id="status">PAUSED</div>
    <div class="clock"   id="clock">00:00</div>
    <div class="remain"  id="remain">20m left</div>
  </div>
  <div class="pv-away">
    <div class="team-name" id="away-name">AWAY</div>
    <div class="score"     id="away-score">0</div>
  </div>
  <div class="pv-bar">
    <div class="dots" id="dots"></div>
    <div class="period-long" id="period-long">1st Half</div>
  </div>

  <div id="notif">
    <div class="n-badge" id="n-badge"></div>
    <span class="n-player" id="n-player"></span>
    <span class="n-min"    id="n-min"></span>
  </div>

  <div id="ad-overlay">
    <img id="ad-img" alt="">
    <div class="ad-text" id="ad-text"></div>
  </div>
</div>

<div id="no-signal">NO SIGNAL</div>

<script>
// ── Calibration grid (?cal=1) ────────────────────────────────────────────────
(function buildCalibration() {
  if (new URLSearchParams(location.search).get('cal') !== '1') return;
  const cal = document.getElementById('cal');
  cal.classList.add('show');
  const cols = 'ABCDEFGH';
  const colors = [
    '#ef4444','#f97316','#eab308','#22c55e','#06b6d4','#3b82f6','#a855f7','#ec4899',
    '#dc2626','#ea580c','#ca8a04','#16a34a','#0891b2','#2563eb','#9333ea','#db2777',
    '#b91c1c','#c2410c','#a16207','#15803d','#0e7490','#1d4ed8','#7e22ce','#be185d',
    '#991b1b','#9a3412','#854d0e','#166534','#155e75','#1e40af','#6b21a8','#9d174d',
  ];
  let i = 0;
  for (let r = 1; r <= 4; r++) {
    for (let c = 0; c < 8; c++) {
      const cell = document.createElement('div');
      cell.className = 'c';
      cell.textContent = cols[c] + r;
      cell.style.background = colors[i++];
      cal.appendChild(cell);
    }
  }
})();

// ── Auto-rotate to keep the layout landscape on portrait screens ─────────────
function applyAutoRotate() {
  const p = new URLSearchParams(location.search);
  if ((p.get('fit') || '').toLowerCase() !== 'stretch') return;
  const b = document.getElementById('board');
  const portrait = window.innerHeight > window.innerWidth;
  if (portrait) {
    b.style.width  = '100vh';
    b.style.height = '100vw';
    b.style.transformOrigin = 'top left';
    b.style.transform = `translate(${window.innerWidth}px, 0) rotate(90deg)`;
    b.style.top = '0';
    b.style.left = '0';
  } else {
    b.style.width  = '100vw';
    b.style.height = '100vh';
    b.style.transform = '';
    b.style.top = '0';
    b.style.left = '0';
  }
}
applyAutoRotate();
window.addEventListener('resize', applyAutoRotate);
window.addEventListener('orientationchange', applyAutoRotate);

// ── LED-mode positioning ─────────────────────────────────────────────────────
// Default: render at native 350×75 in the top-left so the LED controller's
// pixel-for-pixel crop of the HDMI input picks up the whole scoreboard.
// Use ?fit=stretch to preview the full layout on a regular monitor.
(function applyLedMode() {
  const p = new URLSearchParams(location.search);
  if ((p.get('fit') || '').toLowerCase() === 'stretch') return;
  const w = parseInt(p.get('w')) || 350;
  const h = parseInt(p.get('h')) || 75;
  const pos = (p.get('pos') || 'tl').toLowerCase();
  const rot = (parseInt(p.get('rot')) || 0) % 360;

  const b = document.getElementById('board');
  b.style.width  = w + 'px';
  b.style.height = h + 'px';
  b.style.top = b.style.right = b.style.bottom = b.style.left = 'auto';

  const rotated = rot === 90 || rot === 270;
  const visW = rotated ? h : w;
  const visH = rotated ? w : h;
  let tx = 0, ty = 0;
  switch (rot) {
    case 90:  tx = visW; ty = 0;     break;
    case 180: tx = visW; ty = visH;  break;
    case 270: tx = 0;    ty = visH;  break;
  }
  b.style.transformOrigin = 'top left';
  b.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;

  switch (pos) {
    case 'tr': b.style.top = '0';                         b.style.left = `calc(100vw - ${visW}px)`; break;
    case 'bl': b.style.top = `calc(100vh - ${visH}px)`;   b.style.left = '0';                       break;
    case 'br': b.style.top = `calc(100vh - ${visH}px)`;   b.style.left = `calc(100vw - ${visW}px)`; break;
    case 'c':
      b.style.top  = `calc((100vh - ${visH}px) / 2)`;
      b.style.left = `calc((100vw - ${visW}px) / 2)`;
      break;
    default:
      b.style.top = '0'; b.style.left = '0';
  }
})();

// ── WebSocket ─────────────────────────────────────────────────────────────────
const wsProto  = location.protocol === 'https:' ? 'wss' : 'ws';
const wsUrl    = `${wsProto}://${location.host}`;
let   ws, reconnectTimer;

function connect() {
  ws = new WebSocket(wsUrl);
  ws.onopen    = () => clearTimeout(reconnectTimer);
  ws.onmessage = ({ data }) => {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'state') render(msg.data);
    } catch {}
  };
  ws.onclose = () => { reconnectTimer = setTimeout(connect, 2000); };
  ws.onerror  = () => ws.close();
}
connect();

setInterval(() => {
  const ok = ws && ws.readyState === 1;
  document.getElementById('no-signal').style.display = ok ? 'none' : 'block';
}, 1000);

let lastEventSeq = 0;
let notifTimer   = null;

function renderAd(ad) {
  const overlay = document.getElementById('ad-overlay');
  const img     = document.getElementById('ad-img');
  const txt     = document.getElementById('ad-text');
  if (!ad) {
    overlay.classList.remove('show', 'text-only', 'image-only');
    img.removeAttribute('src');
    return;
  }
  if (ad.image) {
    img.src = ad.image;
    img.style.display = '';
  } else {
    img.removeAttribute('src');
    img.style.display = 'none';
  }
  txt.textContent = (ad.text || '').toUpperCase();
  overlay.classList.toggle('text-only',  !ad.image);
  overlay.classList.toggle('image-only', !!ad.image && !ad.text);
  overlay.classList.add('show');
}

function showNotif(evt) {
  const badgeColor = evt.type === 'goal' ? '#22c55e' : evt.type === 'yellow' ? '#FFD700' : '#ef4444';
  document.getElementById('n-badge').style.background  = badgeColor;
  document.getElementById('n-player').textContent = evt.player ? evt.player.toUpperCase() : (evt.type === 'goal' ? 'GOAL' : evt.type === 'yellow' ? 'YELLOW CARD' : 'RED CARD');
  document.getElementById('n-min').textContent    = evt.minute + "'";
  const el = document.getElementById('notif');
  el.style.opacity = '1';
  clearTimeout(notifTimer);
  notifTimer = setTimeout(() => { el.style.opacity = '0'; }, 30000);
}

const pad = n => String(n).padStart(2, '0');

const T = {
  en: { paused:'PAUSED', time:'Time!', minLeft:m=>m+' min left', secLeft:s=>s+'s left', half1:'1st Half', half2:'2nd Half', quarter:q=>'Quarter '+q, period:p=>'Period '+p, brk:'Break', noSignal:'NO SIGNAL' },
  nl: { paused:'PAUZE',  time:'Tijd!', minLeft:m=>m+' min over', secLeft:s=>s+'s over', half1:'1e Helft', half2:'2e Helft', quarter:q=>'Kwart '+q,   period:p=>'Periode '+p, brk:'Pauze', noSignal:'GEEN SIGNAAL' },
};
let lang = T.nl;

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return (0.299*r + 0.587*g + 0.114*b) / 255 > 0.45;
}
function periodShort(p, t) {
  if (t === 2) return p === 1 ? 'H1' : 'H2';
  if (t === 4) return 'Q' + p;
  return 'P' + p;
}
function periodLong(p, t) {
  if (t === 2) return p === 1 ? lang.half1 : lang.half2;
  if (t === 4) return lang.quarter(p);
  return lang.period(p);
}

function render(s) {
  document.getElementById('home-name').textContent  = s.home_name.toUpperCase().slice(0, 14);
  document.getElementById('away-name').textContent  = s.away_name.toUpperCase().slice(0, 14);
  lang = T[s.lang] || T.nl;
  document.getElementById('no-signal').textContent = lang.noSignal;

  renderAd(s.current_ad);

  if (s.event_seq && s.event_seq > lastEventSeq && s.last_event) {
    lastEventSeq = s.event_seq;
    showNotif(s.last_event);
  }

  document.body.style.fontFamily = s.text_font || "'Barlow Condensed', sans-serif";

  if (s.home_color) {
    document.querySelector('.pv-home').style.background = s.home_color;
    const htc = isLight(s.home_color);
    const autoColor = htc ? '#000' : '#fff';
    document.getElementById('home-name').style.color  = s.home_text_color || autoColor;
    document.getElementById('home-score').style.color = s.home_text_color || autoColor;
  }
  if (s.away_color) {
    document.querySelector('.pv-away').style.background = s.away_color;
    const atc = isLight(s.away_color);
    const autoColor = atc ? '#000' : '#fff';
    document.getElementById('away-name').style.color  = s.away_text_color || autoColor;
    document.getElementById('away-score').style.color = s.away_text_color || autoColor;
  }
  document.getElementById('home-score').textContent = s.home_score;
  document.getElementById('away-score').textContent = s.away_score;

  document.getElementById('p-label').textContent = periodShort(s.period, s.total_periods);

  const statusEl = document.getElementById('status');
  statusEl.textContent = s.match_live ? 'LIVE' : lang.paused;
  statusEl.className   = 'status ' + (s.match_live ? 'live' : 'paused');

  document.getElementById('clock').textContent = pad(s.minute) + ':' + pad(s.second);

  const rem = Math.max(0, s.duration_min * 60 - (s.minute * 60 + s.second));
  const rm  = Math.floor(rem / 60), rs = rem % 60;
  document.getElementById('remain').textContent = rem === 0 ? lang.time : rm > 0 ? lang.minLeft(rm) : lang.secLeft(rs);

  const dots = document.getElementById('dots');
  dots.innerHTML = '';
  for (let i = 1; i <= s.total_periods; i++) {
    const d = document.createElement('div');
    d.className = 'dot ' + (i <= s.period ? 'on' : 'off');
    dots.appendChild(d);
  }

  let plong = periodLong(s.period, s.total_periods);
  if (!s.match_live && s.minute === 0 && s.second === 0 && s.period > 1) plong = lang.brk;
  document.getElementById('period-long').textContent = plong;
}
</script>
</body>
</html>
